name: Look Immo CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  backend-checks:
    name: Backend CI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Look-Immo-API/package-lock.json'

      - name: Install Dependencies
        run: |
          cd Look-Immo-API
          npm ci

      - name: Generate Prisma Client
        run: |
          cd Look-Immo-API
          npx prisma generate

      - name: Run ESLint
        run: |
          cd Look-Immo-API
          npm run lint

      - name: Run Typecheck
        run: |
          cd Look-Immo-API
          npm run typecheck

      - name: Run Tests
        run: |
          cd Look-Immo-API
          npm run test

      - name: Run Production Build
        run: |
          cd Look-Immo-API
          npm run build

  frontend-checks:
    name: Frontend CI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Look-Immo-Front/package-lock.json'

      - name: Install Dependencies
        run: |
          cd Look-Immo-Front
          npm ci

      - name: Run ESLint
        run: |
          cd Look-Immo-Front
          npm run lint

      - name: Run Typecheck
        run: |
          cd Look-Immo-Front
          npm run typecheck

      - name: Run Tests
        run: |
          cd Look-Immo-Front
          npm run test

      - name: Run Production Build
        run: |
          cd Look-Immo-Front
          npm run build

  deploy:
    name: Continuous Deployment (Zero-Downtime)
    needs: [backend-checks, frontend-checks]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    steps:
      - name: Deploy to VPS Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "🚀 Starting Deployment on branch: ${{ github.ref_name }}..."
            
            # Navigate to workspace
            cd /var/www/look-immo-api
            
            # Fetch latest changes
            git fetch --all
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            
            # --- 1. DEPLOY API BACKEND ---
            cd Look-Immo-API
            npm ci --include=dev
            npx prisma generate
            npm run build
            
            # Run database migrations
            npx prisma migrate deploy
            
            # --- 2. DEPLOY FRONTEND ---
            cd ../Look-Immo-Front
            npm ci
            npm run build
            
            # --- 3. RELOAD PM2 WITH ZERO DOWNTIME ---
            cd ../Look-Immo-API
            # PM2 reload uses Graceful Shutdown logic in src/index.ts to handle connections smoothly
            pm2 reload ecosystem.config.js --env production
            
            echo "✅ Deployment finished successfully!"
