# ─── Nginx Reverse Proxy Configuration for Look Immo ──────────────────────────
# File: /etc/nginx/sites-available/look-immo.conf
#
# Replace 'look-immo.tn' with your actual domain name.
# Pre-requisite: Build the frontend using `npm run build` inside Look-Immo-Front.
# ──────────────────────────────────────────────────────────────────────────────

# ── 1. HTTP Server Block (Redirect to HTTPS) ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name look-immo.tn www.look-immo.tn;

    # Let's Encrypt Certbot challenge directory
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── 2. HTTPS Server Block ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name look-immo.tn www.look-immo.tn;

    # SSL Certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/look-immo.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/look-immo.tn/privkey.pem;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    
    # SSL Session Optimization
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # 1-Year Strict Transport Security (HSTS) - 31536000 seconds
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Additional Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https: blob:; connect-src 'self' https: wss:;" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Maximum file upload size (matches backend limits, 30MB)
    client_max_body_size 30M;

    # ── A. Vite React Frontend (Static SPA files) ─────────────────────────────
    # Adjust this path to where Look-Immo-Front/dist is located on your server
    root /var/www/look-immo-front/dist;
    index index.html;

    # ── E. SEO Bot Interception — Property & Blog Detail Pages ────────────────
    # These paths are proxied to Express BEFORE the catch-all location / block.
    # The seoInjector middleware then decides:
    #   - Social crawlers (WhatsApp, FB, IG…) → HTML with pre-populated OG tags
    #   - Real users                           → SPA index.html served from disk
    # IMPORTANT: These blocks must appear before `location /` (more specific wins).
    location ~ ^/property/(.+)$ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/blog-post/(.+)$ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Fallback to index.html for client-side routing (React Router SPA)
        try_files $uri $uri/ /index.html;
    }

    # Cache static frontend assets (hashes in filenames ensure they aren't stale)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── B. Serve Uploaded Files Directly (Nginx Caching) ──────────────────────
    # Avoid passing upload file reads to Node.js backend — serve directly from disk
    # Adjust this path to where Look-Immo-API/uploads is located on your server
    location /uploads/ {
        alias /var/www/look-immo-api/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header Access-Control-Allow-Origin "*"; # Allow CORS for frontend loading
        access_log off;
    }

    # ── C. Proxy API Requests to Node Express Backend ─────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        
        # Keep-alive connection configuration
        proxy_set_header Connection "";
        
        # Forward client headers to Express
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id; # Forward custom request correlation ID
        
        # Disable buffering for real-time streams
        proxy_buffering off;
    }

    # ── D. Proxy WebSockets (Socket.io) ──────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        
        # Upgrade request connection header to enable WebSockets handshake
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for persistent WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
