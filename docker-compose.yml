version: '3.8'

services:
  # ─── DATABASE SERVICE (PostgreSQL) ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: look-immo-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lookimmo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lookimmo_network
    # NOTE: Port 5432 is NOT mapped to host ports, keeping it secure and private.

  # ─── BACKEND API SERVICE (Node/Express) ──────────────────────────────────────
  backend:
    build:
      context: ./Look-Immo-API
      dockerfile: Dockerfile
    container_name: look-immo-backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-https://look-immo.tn}
      BACKEND_URL: ${BACKEND_URL:-https://look-immo.tn}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Object Storage Settings (Optional)
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      # Error monitoring (Optional)
      SENTRY_DSN: ${SENTRY_DSN}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lookimmo_network

  # ─── FRONTEND WEB SERVER SERVICE (Nginx + React Build) ──────────────────────
  frontend:
    build:
      context: ./Look-Immo-Front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_BACKEND_URL: ""
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-""}
    container_name: look-immo-frontend
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      SITE_URL: https://look-immo.tn
      PRERENDER_API_URL: http://backend:5000/api
      PRERENDER_BACKEND_URL: http://backend:5000
    depends_on:
      - backend
    networks:
      - lookimmo_network

# ─── PERSISTENT VOLUMES ───────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

# ─── NETWORKS ─────────────────────────────────────────────────────────────────
networks:
  lookimmo_network:
    driver: bridge
