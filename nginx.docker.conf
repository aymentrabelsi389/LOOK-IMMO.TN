# ─── Nginx Reverse Proxy Configuration for Look Immo (Docker) ──────────────────
# Serves Vite static files, handles proxying to API, WebSocket, and serves uploads.
# ──────────────────────────────────────────────────────────────────────────────

# ── 1. HTTP Server Block (Redirect to HTTPS) ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name look-immo.tn www.look-immo.tn;

    # Let's Encrypt Certbot challenge directory
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── 2. HTTPS Server Block ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name look-immo.tn www.look-immo.tn;

    # SSL Certificates (mounted from host's Let's Encrypt directory)
    ssl_certificate /etc/letsencrypt/live/look-immo.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/look-immo.tn/privkey.pem;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    
    # SSL Session Optimization
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # 1-Year Strict Transport Security (HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https: blob:; connect-src 'self' https: wss:;" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Maximum file upload size
    client_max_body_size 30M;

    # ── A. Vite React Frontend (Static SPA files) ─────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ── E. SEO Bot Interception — Property & Blog Detail Pages ────────────────
    # Social crawlers (WhatsApp, FB, IG…) → proxies request to Express API backend
    # Real users                           → Nginx serves the static React build index.html
    location ~ ^/property/(.+)$ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/blog-post/(.+)$ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Fallback to index.html for client-side routing (React Router SPA)
        try_files $uri $uri/ /index.html;
    }

    # Cache static frontend assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── B. Serve Uploaded Files Directly (Nginx Caching) ──────────────────────
    # Serves uploads directly from the shared docker volume for high performance
    location /uploads/ {
        alias /app/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # ── C. Proxy API Requests to Node Express Backend ─────────────────────────
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_buffering off;
    }

    # ── D. Proxy WebSockets (Socket.io) ──────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://backend:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
